name: ServeRest QA CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'
  NODE_OPTIONS: '--unhandled-rejections=warn'

jobs:
  # ─── Testes de API ────────────────────────────────────────────────────────────
  test-api:
    name: Testes de API (Usuários)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache binário do Cypress
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes de API
        run: npx cypress run --browser chrome --headless --spec "cypress/e2e/api/usuarios/usuarios.feature"

      - name: Mesclar relatórios JSON
        if: always()
        run: |
          if ls cypress/reports/mocha/.jsons/*.json 1> /dev/null 2>&1; then
            npm run report:merge
          else
            echo "Nenhum relatório JSON encontrado para mesclar."
          fi
      - name: Gerar relatório HTML
        if: always()
        run: |
          if [ -f cypress/reports/mocha/merged.json ]; then
            npm run report:generate
          else
            echo "merged.json não encontrado, pulando geração de HTML."
          fi
      - name: Upload relatório Mochawesome
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mochawesome-report-api
          path: cypress/reports/html/
          retention-days: 7

      - name: Publicar resumo do relatório no GitHub Actions
        if: always()
        run: |
          echo "## 📊 Mochawesome Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          node -e "
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('cypress/reports/mocha/merged.json'));
          const { passes, failures, pending, duration } = report.stats;
          const total = passes + failures + pending;
          const status = failures === 0 ? '✅ Passed' : '❌ Failed';
          console.log('| Total | ' + total + ' |');
          console.log('| ✅ Passed | ' + passes + ' |');
          console.log('| ❌ Failed | ' + failures + ' |');
          console.log('| ⏱ Duration | ' + (duration / 1000).toFixed(1) + 's |');
          console.log('| Status | ' + status + ' |');
          " >> $GITHUB_STEP_SUMMARY
      - name: Upload screenshots (somente em falha)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-api
          path: cypress/screenshots/
          retention-days: 7

      - name: Upload vídeos (somente em falha)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: videos-api
          path: cypress/videos/
          retention-days: 7

  # ─── Testes de UI (BDD/Cucumber) ─────────────────────────────────────────────
  test-ui:
    name: Testes de UI (BDD Cucumber)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache binário do Cypress
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar dependências
        run: npm ci

      - name: Verificar versão do Chrome disponível
        run: google-chrome --version

      - name: Executar testes UI — Cadastrar Login
        id: test-cadastrar-login
        continue-on-error: true
        run: npx cypress run --browser chrome --headless --spec "cypress/e2e/ui/cadastrarLogin/cadastrarLogin.feature"

      - name: Executar testes UI — Logar
        id: test-logar
        continue-on-error: true
        run: npx cypress run --browser chrome --headless --spec "cypress/e2e/ui/logar/login.feature"

      - name: Mesclar relatórios JSON
        if: always()
        run: |
          if ls cypress/reports/mocha/.jsons/*.json 1> /dev/null 2>&1; then
            npm run report:merge
          else
            echo "Nenhum relatório JSON encontrado para mesclar."
          fi
      - name: Gerar relatório HTML
        if: always()
        run: |
          if [ -f cypress/reports/mocha/merged.json ]; then
            npm run report:generate
          else
            echo "merged.json não encontrado, pulando geração de HTML."
          fi
      - name: Upload relatório Mochawesome
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mochawesome-report-ui
          path: cypress/reports/html/
          retention-days: 7

      - name: Publicar resumo do relatório no GitHub Actions
        if: always()
        run: |
          echo "## 📊 Mochawesome Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          node -e "
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('cypress/reports/mocha/merged.json'));
          const { passes, failures, pending, duration } = report.stats;
          const total = passes + failures + pending;
          const status = failures === 0 ? '✅ Passed' : '❌ Failed';
          console.log('| Total | ' + total + ' |');
          console.log('| ✅ Passed | ' + passes + ' |');
          console.log('| ❌ Failed | ' + failures + ' |');
          console.log('| ⏱ Duration | ' + (duration / 1000).toFixed(1) + 's |');
          console.log('| Status | ' + status + ' |');
          " >> $GITHUB_STEP_SUMMARY
      - name: Verificar resultado dos testes UI
        if: always()
        run: |
          if [ "${{ steps.test-cadastrar-login.outcome }}" = "failure" ] || [ "${{ steps.test-logar.outcome }}" = "failure" ]; then
            echo "Uma ou mais suítes de teste falharam."
            exit 1
          fi
      - name: Upload screenshots (somente em falha)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-ui
          path: cypress/screenshots/
          retention-days: 7

      - name: Upload vídeos (somente em falha)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: videos-ui
          path: cypress/videos/
          retention-days: 7
